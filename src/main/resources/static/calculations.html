<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculations - CPU Scheduling Algorithm Comparator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header with Gradient -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                    <span>CPU Scheduler Pro</span>
                </div>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Input</a>
                    <a href="calculations.html" class="nav-link active">Calculations</a>
                    <a href="algorithm.html" class="nav-link">Algorithm</a>
                    <a href="about.html" class="nav-link">About</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">
                    <span class="gradient-text">Algorithm</span> Calculations
                </h1>
                <p class="hero-subtitle">
                    Detailed step-by-step execution and performance metrics
                </p>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="single-panel">
                <div class="panel">
                    <div class="panel-header">
                        <h2><i class="fas fa-calculator"></i> Algorithm Calculations</h2>
                    </div>
                    
                    <div class="section">
                        <p class="info-message" id="calcInfoMessage">
                            <i class="fas fa-info-circle"></i>
                            Run a comparison first to see detailed calculations
                        </p>
                        
                        <div id="calcTabs" class="calc-tabs" style="display: none;">
                            <button class="calc-tab active" data-algo="acv">ACV-RR (My Algorithm)</button>
                            <button class="calc-tab" data-algo="simple">Simple RR</button>
                        </div>
                        
                        <div id="calcContent" class="calc-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 CPU Scheduler Pro | OS Project - SEM 4</p>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
